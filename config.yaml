# ============================================================
#  auto-label-from-video 設定檔
# ============================================================

# ── 影片來源 ────────────────────────────────────────────────
source:
  # 影片檔路徑（支援 .mp4 / .avi / .mov 等 OpenCV 可讀格式）
  path: "CCTV_01/VIRAT_S_000002.mp4"

# ── Frame 抽樣設定 ──────────────────────────────────────────
extraction:
  # 抽取後的 frame 儲存目錄
  output_dir: "data/extracted_frames"

  # 每隔幾幀抽一張（1 = 每幀都抽；30 = 每秒約抽 1 張）
  frame_interval: 10

  # 最多抽幾張（0 = 不限制）
  max_frames: 200

# ── 分類 / 標籤設定 ─────────────────────────────────────────
classification:
  # 分類結果的輸出根目錄
  output_dir: "data/labeled_output"

  # 二元分類設定（Binary Classification）
  # CLIP 文字描述：positive = 你「想找」的類別
  positive_label: "a person wearing red clothes"

  # CLIP 文字描述：干擾項（可填多個，幫助模型排除不相關類別）
  negative_labels:
    - "no person"
    - "other"

  # 兩個輸出子資料夾的名稱
  positive_folder: "red"
  negative_folder: "non_red"

  # positive_label 的機率須超過此門檻才算命中（建議 0.5 ~ 0.7）
  confidence_threshold: 0.55

  # 三元分類設定（Ternary Classification）
  ternary_mode: false  # 設為 true 啟用三元分類
  ternary_labels:
    - "a person wearing red clothes."
    - "no person"
    - "other"
  ternary_folders:
    - "red_person"
    - "no_person"
    - "other"
